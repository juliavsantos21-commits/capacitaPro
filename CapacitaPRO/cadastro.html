<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CapacitaPro - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <div class="container">
            <div class="logo">
                </i> Capacita<span class="logo-pro">Pro</span>
            </div>

            <div class="glass-card">
                <h1>Crie sua Conta!</h1>
                <p>Preencha o formulário para se cadastrar.</p>

                <form>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Nome Completo">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="E-mail">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Senha">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Confirmar Senha">
                    </div>

                    <button type="submit" class="btn-submit">Cadastrar</button>
                </form>

                <div class="separator"><span>OU ENTRE COM</span></div>

                <div class="social-container">
                    <button class="btn-social google"><i class="fab fa-google"></i> Google</button>
                    <button class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>

                <div class="footer">
                    Já tem uma conta? <a href="#">Faça login</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
