<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda e Contato - CapacitaPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
           
            <div class="logo-text">
                <h1>Capacita<span>Pro</span></h1>
                <small>TREINAMENTOS PROFISSIONAIS</small>
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Cursos</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#" class="active">Contato</a></li>
               
            </ul>
        </nav>
    </header>

    <main class="container">
        </div>

        <section class="form-section">
            <h2 class="section-title">Entre em Contato</h2>
            <p class="section-subtitle">Caso não encontre a resposta que procura, envie-nos uma mensagem. Estamos aqui para te ajudar!</p>
           
            <form class="contact-form">
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Seu nome</label>
                    <input type="text" class="glass-input" placeholder="">
                </div>
               
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Seu e-mail</label>
                    <input type="email" class="glass-input" placeholder="">
                </div>
               
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Assunto</label>
                    <input type="text" class="glass-input" placeholder="">
                </div>
               
                <div class="input-group full-width">
                    <textarea class="glass-input" placeholder="Mensagem" rows="4"></textarea>
                    <button type="submit" class="btn-submit">
                        </i> Enviar Mensagem
                    </button>
                </div>
            </form>
        </section>

    </main>

</body>
</html>
