<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CapacitaPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <header class="navbar">
        <a href="index.html" class="logo-link">
            <div class="logo-text-wrapper">
                <h1 class="brand-title">Capacita<span class="brand-pro">Pro</span></h1>
                <span class="brand-subtitle">TREINAMENTOS PROFISSIONAIS</span>
            </div>
        </a>
    </header>

    <main class="login-main-container">
        
        <div class="login-grid">
            <div class="login-left">
                <h2 class="login-title">Faça seu Login</h2>
                <p class="login-subtitle">Bem-vindo de volta! Insira suas informações para acessar sua conta.</p>

                <div class="glass-panel form-card">
                    <form>
                        <div class="input-group">
                            <i class="fas fa-envelope icon-left"></i>
                            <input type="text" class="glass-input" placeholder="E-mail ou Número de Matrícula">
                        </div>
                        
                        <div class="input-group">
                            <i class="fas fa-lock icon-left"></i>
                            <input type="password" class="glass-input" placeholder="Senha">
                            <i class="fas fa-eye icon-right"></i>
                        </div>

                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" checked>
                                <span class="custom-checkbox"><i class="fas fa-check"></i></span>
                                Lembrar-me
                            </label>
                        </div>

                        <button type="submit" class="btn-green-block">Entrar</button>
                    </form>

                    <div class="form-links">
                        <div class="divider">
                            <span>Esqueceu sua senha?</span>
                        </div>
                        <p>Ainda não tem uma conta?</p>
                        <p>Cadastrar-se</p>
                    </div>
                </div>
            </div>
        </div>
           
    </main>

    <footer class="login-footer">
        <p>Ainda não tem uma conta?</p>
        <p>Cadastrar-se</p>
    </footer>

</body>
</html>
