<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CapacitaPro Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="logo">CapacitaPro</div>

    <div class="card">
      <h2>Acesse seu Portal de Capacitação</h2>

      <div class="input-group">
        <input type="text" placeholder="Usuário ou E-mail">
      </div>

      <div class="input-group">
        <input type="password" placeholder="Senha">
      </div>

      <div class="options">
        <label><input type="checkbox"> Lembrar-me</label>
        <a href="#">Esqueci a senha?</a>
      </div>

      <button class="btn">ENTRAR</button>

      <p>OU ENTRE COM</p>

      <div class="social">
        <button class="google">Google</button>
        <button class="linkedin">facebook</button>
      </div>

      <div class="footer">
        Não tem uma conta? <a href="#">Cadastre-se agora.</a>
      </div>
    </div>
  </div>

</body>
</html>
